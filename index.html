// ── INDICATOR ENGINE (unchanged logic) ───────────────────────────────────────
function calcEMA(prices,period){
  if(prices.length<period)return prices[prices.length-1]||0;
  const k=2/(period+1);
  let ema=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<prices.length;i++)ema=prices[i]*k+ema*(1-k);
  return ema;
}
function calcSMA(prices,period){return prices.slice(-period).reduce((a,b)=>a+b,0)/prices.slice(-period).length;}
function calcRSI(prices,period){
  if(prices.length<period+2)return 50;
  let gains=0,losses=0;
  for(let i=prices.length-period;i<prices.length;i++){
    const d=prices[i]-prices[i-1];
    if(d>0)gains+=d;else losses+=Math.abs(d);
  }
  return 100-100/(1+gains/(losses||0.0001));
}
function calcStoch(candles,period){
  const sl=candles.slice(-period);
  const hi=Math.max(...sl.map(c=>c.high)),lo=Math.min(...sl.map(c=>c.low));
  return((candles[candles.length-1].close-lo)/(hi-lo||0.0001))*100;
}
function calcBollinger(prices,period,mult=2){
  const sl=prices.slice(-period);
  const mean=sl.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(sl.reduce((s,v)=>s+Math.pow(v-mean,2),0)/period);
  return{upper:mean+mult*std,middle:mean,lower:mean-mult*std,std,squeeze:std<mean*0.0007};
}
function calcMACD(prices,fast,slow,signal){
  // Build a proper MACD line series, then EMA that series for the signal line
  if(prices.length<slow+signal){
    const fastEMA=calcEMA(prices,fast),slowEMA=calcEMA(prices,slow);
    const macdLine=fastEMA-slowEMA;
    return{macd:macdLine,signal:macdLine,hist:0};
  }
  const macdSeries=[];
  for(let i=slow-1;i<prices.length;i++){
    const slice=prices.slice(0,i+1);
    macdSeries.push(calcEMA(slice,fast)-calcEMA(slice,slow));
  }
  const macdLine=macdSeries[macdSeries.length-1];
  const signalLine=calcEMA(macdSeries,signal);
  return{macd:macdLine,signal:signalLine,hist:macdLine-signalLine};
}
function calcATR(candles,period){
  const sl=candles.slice(-period);
  const trs=sl.map((c,i)=>{
    if(i===0)return c.high-c.low;
    const prev=sl[i-1];
    return Math.max(c.high-c.low,Math.abs(c.high-prev.close),Math.abs(c.low-prev.close));
  });
  return trs.reduce((a,b)=>a+b,0)/period;
}
function calcCCI(candles,period){
  const sl=candles.slice(-period);
  const tp=sl.map(c=>(c.high+c.low+c.close)/3);
  const mean=tp.reduce((a,b)=>a+b,0)/period;
  const md=tp.reduce((s,v)=>s+Math.abs(v-mean),0)/period;
  return(tp[tp.length-1]-mean)/(0.015*(md||0.0001));
}
function calcWilliamsR(candles,period){
  const sl=candles.slice(-period);
  const hi=Math.max(...sl.map(c=>c.high)),lo=Math.min(...sl.map(c=>c.low));
  return((hi-candles[candles.length-1].close)/(hi-lo||0.0001))*-100;
}
function calcVWAP(candles){
  const sl=candles.slice(-20);let pv=0,vol=0;
  sl.forEach(c=>{const tp=(c.high+c.low+c.close)/3,v=Math.abs(c.close-c.open)*10000+1;pv+=tp*v;vol+=v;});
  return pv/vol;
}
function calcMFI(candles,period){
  const sl=candles.slice(-period-1);let posFlow=0,negFlow=0;
  for(let i=1;i<sl.length;i++){
    const tp=(sl[i].high+sl[i].low+sl[i].close)/3,prevTp=(sl[i-1].high+sl[i-1].low+sl[i-1].close)/3;
    const vol=Math.abs(sl[i].close-sl[i].open)*10000+1;
    if(tp>prevTp)posFlow+=tp*vol;else negFlow+=tp*vol;
  }
  return 100-100/(1+posFlow/(negFlow||0.0001));
}
function calcSupportResistance(candles){
  const highs=candles.map(c=>c.high).sort((a,b)=>b-a),lows=candles.map(c=>c.low).sort((a,b)=>a-b);
  return{resistance:highs.slice(0,5).reduce((a,b)=>a+b,0)/5,support:lows.slice(0,5).reduce((a,b)=>a+b,0)/5};
}
function detectCandlePattern(candles){
  const c=candles[candles.length-1],p1=candles[candles.length-2],p2=candles[candles.length-3];
  const body=Math.abs(c.close-c.open),range=c.high-c.low;
  const upWick=c.high-Math.max(c.open,c.close),downWick=Math.min(c.open,c.close)-c.low;
  const isBull=c.close>c.open;
  const doji=body<range*0.1,hammer=isBull&&downWick>body*2&&upWick<body*0.3;
  const shootingStar=!isBull&&upWick>body*2&&downWick<body*0.3;
  const bullEngulf=c.close>c.open&&p1.close<p1.open&&c.open<p1.close&&c.close>p1.open;
  const bearEngulf=c.close<c.open&&p1.close>p1.open&&c.open>p1.close&&c.close<p1.open;
  const mornStar=p2.close<p2.open&&doji&&c.close>c.open&&c.close>(p2.open+p2.close)/2;
  const eveStar=p2.close>p2.open&&doji&&c.close<c.open&&c.close<(p2.open+p2.close)/2;
  const threeWhite=c.close>c.open&&p1.close>p1.open&&p2.close>p2.open&&c.close>p1.close&&p1.close>p2.close;
  const threeBlack=c.close<c.open&&p1.close<p1.open&&p2.close<p2.open&&c.close<p1.close&&p1.close<p2.close;
  const pinBull=isBull&&downWick>body*1.8,pinBear=!isBull&&upWick>body*1.8;
  const hhhl=c.high>p1.high&&p1.high>p2.high&&c.low>p1.low,llhl=c.low<p1.low&&p1.low<p2.low&&c.high<p1.high;
  if(threeWhite)return{sig:"BUY",pat:"Three White Soldiers",str:4};
  if(threeBlack)return{sig:"SELL",pat:"Three Black Crows",str:4};
  if(mornStar)return{sig:"BUY",pat:"Morning Star ★",str:3};
  if(eveStar)return{sig:"SELL",pat:"Evening Star ★",str:3};
  if(bullEngulf)return{sig:"BUY",pat:"Bullish Engulfing ↑",str:3};
  if(bearEngulf)return{sig:"SELL",pat:"Bearish Engulfing ↓",str:3};
  if(hammer)return{sig:"BUY",pat:"Hammer Reversal ↑",str:2};
  if(shootingStar)return{sig:"SELL",pat:"Shooting Star ↓",str:2};
  if(pinBull)return{sig:"BUY",pat:"Bullish Pin Bar",str:2};
  if(pinBear)return{sig:"SELL",pat:"Bearish Pin Bar",str:2};
  if(hhhl)return{sig:"BUY",pat:"HH-HL Uptrend ↑",str:2};
  if(llhl)return{sig:"SELL",pat:"LL-LH Downtrend ↓",str:2};
  if(doji)return{sig:"WAIT",pat:"Doji — Indecision",str:0};
  return{sig:"NEUTRAL",pat:"No Clear Pattern",str:0};
}
function calcTrendStrength(candles,period=14){
  const sl=candles.slice(-period);let upMoves=0,downMoves=0;
  for(let i=1;i<sl.length;i++){
    const upMove=sl[i].high-sl[i-1].high,downMove=sl[i-1].low-sl[i].low;
    if(upMove>downMove&&upMove>0)upMoves+=upMove;
    if(downMove>upMove&&downMove>0)downMoves+=downMove;
  }
  const total=upMoves+downMoves||1;
  return{strength:Math.abs(upMoves-downMoves)/total*100,dir:upMoves>downMoves?"UP":"DOWN"};
}
function calcMTFBias(candles){
  const prices=candles.map(c=>c.close);
  const ema8=calcEMA(prices,8),ema21=calcEMA(prices,21),ema55=calcEMA(prices,55),current=prices[prices.length-1];
  let bull=0,bear=0;
  if(ema8>ema21)bull++;else bear++;
  if(ema21>ema55)bull++;else bear++;
  if(current>ema8)bull++;else bear++;
  if(current>ema21)bull++;else bear++;
  return{bias:bull>bear?"BULL":"BEAR",strength:Math.abs(bull-bear),ema8,ema21,ema55};
}
function calcDivergence(candles){
  const recent=candles.slice(-8),prices=recent.map(c=>c.close);
  const momentum=recent.map((c,i)=>i===0?0:c.close-recent[i-1].close);
  const lastPrice=prices[prices.length-1],prevPrice=prices[prices.length-4];
  const lastMom=momentum.slice(-3).reduce((a,b)=>a+b,0),prevMom=momentum.slice(-7,-4).reduce((a,b)=>a+b,0);
  if(lastPrice<prevPrice&&lastMom>prevMom)return{type:"BULL",label:"Bullish Divergence Detected"};
  if(lastPrice>prevPrice&&lastMom<prevMom)return{type:"BEAR",label:"Bearish Divergence Detected"};
  return{type:"NONE",label:"No Divergence"};
}

function generateScalpSignal(candles){
  const prices=candles.map(c=>c.close);
  const rsi=calcRSI(prices,7),rsi14=calcRSI(prices,14);
  const stoch=calcStoch(candles,7),cci=calcCCI(candles,10),wr=calcWilliamsR(candles,7);
  const macd=calcMACD(prices,5,13,4),bb=calcBollinger(prices,10),atr=calcATR(candles,7);
  const mfi=calcMFI(candles,10),mtf=calcMTFBias(candles),pattern=detectCandlePattern(candles);
  const diverg=calcDivergence(candles),tStr=calcTrendStrength(candles,10);

  else if(stoch<20){buy+=16;reasons.push({txt:`Stoch(7) Oversold ${stoch.toFixed(0)}`,t:"buy",w:2});}
  else if(stoch>94){sell+=25;reasons.push({txt:`Stoch(7) Extreme Overbought ${stoch.toFixed(0)} — Drop!`,t:"sell",w:4});}

  else{sell+=8;reasons.push({txt:`Fast MACD Bearish Cross`,t:"sell",w:1});}
  if(price<=bb.lower*1.0005){buy+=22;reasons.push({txt:`Price at BB Lower — Reversal Expected`,t:"buy",w:3});}
  else if(price>=bb.upper*0.9995){sell+=22;reasons.push({txt:`Price at BB Upper — Rejection Expected`,t:"sell",w:3});}
  else if(bb.squeeze)reasons.push({txt:`BB Squeeze — Fast Breakout Imminent`,t:"neutral",w:0});
  else reasons.push({txt:`Price Inside Bollinger Bands`,t:"neutral",w:0});
  if(wr<-88){buy+=16;reasons.push({txt:`Williams %R Oversold (${wr.toFixed(0)})`,t:"buy",w:2});}
  else if(wr>-12){sell+=16;reasons.push({txt:`Williams %R Overbought (${wr.toFixed(0)})`,t:"sell",w:2});}
  else reasons.push({txt:`Williams %R Neutral (${wr.toFixed(0)})`,t:"neutral",w:0});

  else reasons.push({txt:`CCI(10) Neutral (${cci.toFixed(0)})`,t:"neutral",w:0});
  if(mfi<25){buy+=14;reasons.push({txt:`MFI Oversold (${mfi.toFixed(0)}) — Buy Pressure`,t:"buy",w:2});}
  else if(mfi>75){sell+=14;reasons.push({txt:`MFI Overbought (${mfi.toFixed(0)}) — Sell Pressure`,t:"sell",w:2});}
  else reasons.push({txt:`MFI Neutral (${mfi.toFixed(0)})`,t:"neutral",w:0});
  if(mtf.bias==="BULL"){buy+=10*mtf.strength;reasons.push({txt:`EMA Stack Bullish (${mtf.strength}/4 aligned)`,t:"buy",w:mtf.strength});}
  else{sell+=10*mtf.strength;reasons.push({txt:`EMA Stack Bearish (${mtf.strength}/4 aligned)`,t:"sell",w:mtf.strength});}

  if(dSup<dRes){buy+=10;reasons.push({txt:`Price Near Support Zone (${support.toFixed(5)})`,t:"buy",w:2});}
  else{sell+=10;reasons.push({txt:`Price Near Resistance Zone (${resistance.toFixed(5)})`,t:"sell",w:2});}

  else if(pattern.sig==="SELL"){sell+=14*pattern.str;reasons.push({txt:`${pattern.pat} — Scalp Sell`,t:"sell",w:pattern.str});}

    else{sell+=12;reasons.push({txt:`Strong Downtrend (ADX ${tStr.strength.toFixed(0)})`,t:"sell",w:2});}

  return _decideSignal(buy,sell,reasons,{price,rsi,stoch,cci,wr,macd,bb,atr,mfi,mtf,pattern,diverg,tStr,vwap,support,resistance,trend:mtf.bias==="BULL"?"UP":"DOWN"});

function generateSwingSignal(candles){
  const prices=candles.map(c=>c.close);
  const rsi=calcRSI(prices,14),stoch=calcStoch(candles,14),cci=calcCCI(candles,20);
  const wr=calcWilliamsR(candles,14),macd=calcMACD(prices,12,26,9),bb=calcBollinger(prices,20);
  const atr=calcATR(candles,14),mfi=calcMFI(candles,14),mtf=calcMTFBias(candles);
  const pattern=detectCandlePattern(candles),diverg=calcDivergence(candles),tStr=calcTrendStrength(candles,14);
  const{support,resistance}=calcSupportResistance(candles);
  const price=prices[prices.length-1],vwap=calcVWAP(candles);
  const ema9=calcEMA(prices,9),ema21=calcEMA(prices,21),ema50=calcEMA(prices,50);
  let buy=0,sell=0,reasons=[];
  if(rsi<18){buy+=28;reasons.push({txt:`RSI(14) Extreme Oversold ${rsi.toFixed(1)} — Strong Reversal`,t:"buy",w:4});}
  else if(rsi<30){buy+=22;reasons.push({txt:`RSI(14) Oversold ${rsi.toFixed(1)} — Buy Zone`,t:"buy",w:3});}
  else if(rsi>82){sell+=28;reasons.push({txt:`RSI(14) Extreme Overbought ${rsi.toFixed(1)} — Reversal`,t:"sell",w:4});}
  else if(rsi>70){sell+=22;reasons.push({txt:`RSI(14) Overbought ${rsi.toFixed(1)} — Sell Zone`,t:"sell",w:3});}
  else reasons.push({txt:`RSI(14) Neutral ${rsi.toFixed(1)}`,t:"neutral",w:0});
  if(stoch<10){buy+=20;reasons.push({txt:`Stoch(14) Extreme Oversold ${stoch.toFixed(0)} — Bounce`,t:"buy",w:3});}
  else if(stoch<25){buy+=14;reasons.push({txt:`Stoch(14) Oversold ${stoch.toFixed(0)}`,t:"buy",w:2});}
  else if(stoch>90){sell+=20;reasons.push({txt:`Stoch(14) Extreme Overbought ${stoch.toFixed(0)}`,t:"sell",w:3});}
  else if(stoch>75){sell+=14;reasons.push({txt:`Stoch(14) Overbought ${stoch.toFixed(0)}`,t:"sell",w:2});}
  else reasons.push({txt:`Stoch(14) Neutral ${stoch.toFixed(0)}`,t:"neutral",w:0});
  if(macd.macd>0&&macd.hist>0){buy+=20;reasons.push({txt:`MACD(12/26/9) Bullish + Histogram Rising`,t:"buy",w:3});}
  else if(macd.macd<0&&macd.hist<0){sell+=20;reasons.push({txt:`MACD(12/26/9) Bearish + Histogram Falling`,t:"sell",w:3});}
  else if(macd.macd>0){buy+=10;reasons.push({txt:`MACD Bullish Cross`,t:"buy",w:1});}
  else{sell+=10;reasons.push({txt:`MACD Bearish Cross`,t:"sell",w:1});}
  if(price<=bb.lower){buy+=22;reasons.push({txt:`Price Below BB Lower — Reversal Up`,t:"buy",w:3});}
  else if(price>=bb.upper){sell+=22;reasons.push({txt:`Price Above BB Upper — Reversal Down`,t:"sell",w:3});}
  else if(bb.squeeze)reasons.push({txt:`BB Squeeze — Breakout Imminent`,t:"neutral",w:0});
  const bullStack=ema9>ema21&&ema21>ema50,bearStack=ema9<ema21&&ema21<ema50;
  if(bullStack){buy+=18;reasons.push({txt:`EMA 9>21>50 — Strong Uptrend`,t:"buy",w:3});}
  else if(bearStack){sell+=18;reasons.push({txt:`EMA 9<21<50 — Strong Downtrend`,t:"sell",w:3});}
  else if(ema9>ema21){buy+=9;reasons.push({txt:`EMA9 > EMA21 — Uptrend`,t:"buy",w:1});}
  else{sell+=9;reasons.push({txt:`EMA9 < EMA21 — Downtrend`,t:"sell",w:1});}
  const abvVWAP=price>vwap;
  if(abvVWAP&&ema9>ema21){buy+=12;reasons.push({txt:`Price Above VWAP — Bullish Bias`,t:"buy",w:2});}
  else if(!abvVWAP&&ema9<ema21){sell+=12;reasons.push({txt:`Price Below VWAP — Bearish Bias`,t:"sell",w:2});}
  if(wr<-85){buy+=14;reasons.push({txt:`Williams %R Oversold (${wr.toFixed(0)})`,t:"buy",w:2});}
  else if(wr>-15){sell+=14;reasons.push({txt:`Williams %R Overbought (${wr.toFixed(0)})`,t:"sell",w:2});}
  if(cci<-150){buy+=14;reasons.push({txt:`CCI(20) Oversold (${cci.toFixed(0)})`,t:"buy",w:2});}
  else if(cci>150){sell+=14;reasons.push({txt:`CCI(20) Overbought (${cci.toFixed(0)})`,t:"sell",w:2});}
  if(mfi<25){buy+=14;reasons.push({txt:`MFI(14) Oversold (${mfi.toFixed(0)})`,t:"buy",w:2});}
  else if(mfi>75){sell+=14;reasons.push({txt:`MFI(14) Overbought (${mfi.toFixed(0)})`,t:"sell",w:2});}
  const dSup=Math.abs(price-support),dRes=Math.abs(price-resistance);
  if(dSup<dRes){buy+=12;reasons.push({txt:`Price Near Support (${support.toFixed(5)})`,t:"buy",w:2});}
  else{sell+=12;reasons.push({txt:`Price Near Resistance (${resistance.toFixed(5)})`,t:"sell",w:2});}
  if(pattern.sig==="BUY"){buy+=15*pattern.str;reasons.push({txt:`${pattern.pat} — Bullish Confirmation`,t:"buy",w:pattern.str});}
  else if(pattern.sig==="SELL"){sell+=15*pattern.str;reasons.push({txt:`${pattern.pat} — Bearish Confirmation`,t:"sell",w:pattern.str});}
  if(diverg.type==="BULL"){buy+=18;reasons.push({txt:`${diverg.label}`,t:"buy",w:3});}
  if(diverg.type==="BEAR"){sell+=18;reasons.push({txt:`${diverg.label}`,t:"sell",w:3});}
  if(tStr.strength>35){
    if(tStr.dir==="UP"){buy+=14;reasons.push({txt:`Strong Trend Confirmed UP (${tStr.strength.toFixed(0)}%)`,t:"buy",w:2});}
    else{sell+=14;reasons.push({txt:`Strong Trend Confirmed DOWN (${tStr.strength.toFixed(0)}%)`,t:"sell",w:2});}
  }
  if(mtf.bias==="BULL"){buy+=10*mtf.strength;reasons.push({txt:`Multi-Frame Bullish (${mtf.strength}/4)`,t:"buy",w:mtf.strength});}
  else{sell+=10*mtf.strength;reasons.push({txt:`Multi-Frame Bearish (${mtf.strength}/4)`,t:"sell",w:mtf.strength});}
  const trend=ema9>ema21?"UP":"DOWN";
  return _decideSignal(buy,sell,reasons,{price,rsi,stoch,cci,wr,macd,bb,atr,mfi,mtf,pattern,diverg,tStr,vwap,support,resistance,trend});
}

function _decideSignal(buy,sell,reasons,meta){
  const total=buy+sell||1,buyRatio=buy/total;
  const bSig=reasons.filter(r=>r.t==="buy").length,sSig=reasons.filter(r=>r.t==="sell").length;
  const bW=reasons.filter(r=>r.t==="buy").reduce((s,r)=>s+(r.w||1),0);
  const sW=reasons.filter(r=>r.t==="sell").reduce((s,r)=>s+(r.w||1),0);
  const strongBuy=buy>sell+20&&buyRatio>0.62&&bSig>=5&&bW>=10;
  const strongSell=sell>buy+20&&buyRatio<0.38&&sSig>=5&&sW>=10;
  let signal,confidence;
  if(strongBuy){signal="BUY";confidence=Math.min(96,Math.max(87,Math.round((buy/total)*100)+10));}
  else if(strongSell){signal="SELL";confidence=Math.min(96,Math.max(87,Math.round((sell/total)*100)+10));}
  else{signal="WAIT";confidence=Math.round(50+Math.abs(buyRatio-0.5)*28);}

  // Volatility filter — checks ATR against price to flag dead / choppy conditions
  const atrPct=(meta.atr/meta.price)*100;
  if(atrPct<0.015){
    reasons.push({txt:`Low Volatility (ATR ${atrPct.toFixed(3)}%) — Reduced Reliability`,t:"neutral",w:0});
    if(signal!=="WAIT")confidence=Math.max(75,confidence-6);
  }else if(atrPct>0.05){
    reasons.push({txt:`Healthy Volatility (ATR ${atrPct.toFixed(3)}%) — Good Conditions`,t:signal==="BUY"?"buy":signal==="SELL"?"sell":"neutral",w:0});
    if(signal!=="WAIT")confidence=Math.min(97,confidence+2);
  }else{
    reasons.push({txt:`Normal Volatility (ATR ${atrPct.toFixed(3)}%)`,t:"neutral",w:0});
  }

  return{signal,confidence,buy,sell,reasons,...meta};
}

function generateCandles(count=100,basePrice){
  let price=basePrice||(1.0+Math.random()*0.5);
  const candles=[],trendBias=(Math.random()-0.5)*0.0002;
  for(let i=0;i<count;i++){
    const open=price,change=(Math.random()-0.495+trendBias)*price*0.0009,close=open+change;
    const high=Math.max(open,close)+Math.random()*price*0.0004;
    const low=Math.min(open,close)-Math.random()*price*0.0004;
    candles.push({open,close,high,low,time:i});price=close;
  }
  return candles;
}
function getPairFlag(pair){
  const isCrypto=["Bitcoin","Ethereum","Litecoin","Ripple","Solana","BNB","Dash","Chainlink","Polkadot","Toncoin","Ethereum Classic","Bitcoin Cash","Binance Coin"].some(c=>pair.includes(c));
  const isCommod=["Gold","Silver","UKBrent","USCrude"].some(c=>pair.includes(c));
  if(isCrypto){
    if(pair.includes("Bitcoin"))return"₿";

  if(slash>0){const b=FLAG[clean.substring(0,slash)]||"🌐",q=FLAG[clean.substring(slash+1)]||"🌐";return`${b}${q}`;}
  return"💱";
}

// ── MINI CHART ────────────────────────────────────────────────────────────────
function MiniChart({candles,signal}){
  if(!candles||candles.length<2)return null;
  const W=340,H=72,recent=candles.slice(-50);
  const allP=recent.flatMap(c=>[c.high,c.low]);
  const minP=Math.min(...allP),maxP=Math.max(...allP),range=maxP-minP||0.001;
  const cw=W/recent.length-0.8;
  const toY=v=>H-((v-minP)/range)*(H-6)-3,toX=i=>i*(W/recent.length)+cw/2;
  const closePrices=recent.map(c=>c.close);
  const emaLine=closePrices.map((_,i)=>{
    if(i<7)return closePrices.slice(0,i+1).reduce((a,b)=>a+b,0)/(i+1);
    const k=2/9;let ema=closePrices.slice(0,7).reduce((a,b)=>a+b,0)/7;
    for(let j=7;j<=i;j++)ema=closePrices[j]*k+ema*(1-k);return ema;
  });
  const sigColor=signal==="BUY"?D.emerald:signal==="SELL"?D.rose:D.amber;
  return(
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      <polyline points={emaLine.map((v,i)=>`${toX(i)},${toY(v)}`).join(" ")}
        fill="none" stroke={`${sigColor}60`} strokeWidth={1.5} strokeLinecap="round"/>
      {recent.map((c,i)=>{
        const x=toX(i),isUp=c.close>=c.open;
        const bTop=toY(Math.max(c.open,c.close)),bBot=toY(Math.min(c.open,c.close));
        return(
          <g key={i}>
            <line x1={x} y1={toY(c.high)} x2={x} y2={toY(c.low)}
              stroke={isUp?`${D.emerald}70`:`${D.rose}70`} strokeWidth={0.7}/>
            <rect x={x-cw/2} y={bTop} width={cw} height={Math.max(bBot-bTop,1.5)}
              fill={isUp?"#14532D":"#881337"} rx={0.6}/>
          </g>
        );
      })}
    </svg>
  );
}

            <MiniChart candles={candles} signal={analysis?.signal||""}/>
          </div>
        </div>

        {/* COUNTDOWN */}
        {countdown!==null&&countdown>0&&(
          <div style={{
            background:"rgba(255,255,255,0.03)",borderRadius:14,
            padding:"10px 16px",marginBottom:12,
            border:`1px solid ${countdownColor}25`,
            display:"flex",alignItems:"center",justifyContent:"space-between"
          }}>
            <div style={{fontSize:9,color:D.textSub,letterSpacing:1,fontWeight:600}}>NEXT SIGNAL IN</div>
            <div style={{fontSize:18,fontWeight:900,color:countdownColor,fontFamily:"'JetBrains Mono',monospace",
              textShadow:`0 0 12px ${countdownColor}60`}}>
              {fmtCountdown(countdown)}
            </div>
          </div>
        )}

        {/* GENERATE BUTTON */}
        {!loading&&(
          <button onClick={handleGenerate} style={{
            width:"100%",padding:"16px",borderRadius:18,border:"none",
            background:`linear-gradient(135deg,${D.violetDim},${D.violet},${D.violetBrt})`,
            color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",
            boxShadow:`0 8px 32px rgba(20,184,166,0.45),0 2px 8px rgba(0,0,0,0.4)`,
            letterSpacing:3,marginBottom:12,transition:"all 0.2s",
            fontFamily:"'Space Grotesk',sans-serif",
            display:"flex",alignItems:"center",justifyContent:"center",gap:10
          }}>
            <span style={{fontSize:16}}>◈</span>
            {mode==="SCALP"?"GENERATE SCALP SIGNAL":"GENERATE SWING SIGNAL"}
            <span style={{fontSize:16}}>◈</span>
          </button>
        )}

        {/* LOADER */}
        {loading&&<SignalLoader pair={pair} timeframe={tf.label} mode={mode}/>}

        {/* SIGNAL CARD */}
        {analysis&&!loading&&(
          <SignalCard analysis={analysis} pair={pair} timeframe={tf.label} mode={mode} isOTC={isOTC}/>
        )}

        {/* INDICATOR GRID */}
        {analysis&&!loading&&(
          <div style={{background:"linear-gradient(135deg,#0F1521,#141B2C)",borderRadius:18,
            padding:"14px",marginBottom:12,border:`1px solid rgba(255,255,255,0.06)`}}>
            <div style={{fontSize:8,color:modeColor,marginBottom:12,fontWeight:700,
              letterSpacing:2,fontFamily:"'Space Grotesk',sans-serif"}}>
              {mode==="SCALP"?"⚡ SCALP INDICATORS":"◈ SWING INDICATORS"} — 13 LAYERS
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {(mode==="SCALP"?[
                {label:"RSI (7)",value:analysis.rsi.toFixed(1),sub:analysis.rsi<25?"Oversold ↑":analysis.rsi>75?"Overbought ↓":"Neutral",color:analysis.rsi<25?D.emerald:analysis.rsi>75?D.rose:D.sky},
                {label:"Stoch (7)",value:analysis.stoch.toFixed(1),sub:analysis.stoch<20?"Oversold ↑":analysis.stoch>80?"Overbought ↓":"Neutral",color:analysis.stoch<20?D.emerald:analysis.stoch>80?D.rose:D.sky},
                {label:"Fast MACD",value:(analysis.macd.macd*10000).toFixed(2),sub:analysis.macd.macd>0?"Bullish ↑":"Bearish ↓",color:analysis.macd.macd>0?D.emerald:D.rose},
                {label:"Williams %R",value:analysis.wr.toFixed(1),sub:analysis.wr<-85?"Oversold":analysis.wr>-15?"Overbought":"Neutral",color:analysis.wr<-85?D.emerald:analysis.wr>-15?D.rose:D.sky},
                {label:"CCI (10)",value:analysis.cci.toFixed(0),sub:analysis.cci<-140?"Oversold":analysis.cci>140?"Overbought":"Neutral",color:analysis.cci<-140?D.emerald:analysis.cci>140?D.rose:D.sky},
                {label:"MFI (10)",value:analysis.mfi.toFixed(0),sub:analysis.mfi<25?"Oversold":analysis.mfi>75?"Overbought":"Neutral",color:analysis.mfi<25?D.emerald:analysis.mfi>75?D.rose:D.sky},
                {label:"BB (10)",value:analysis.bb.middle.toFixed(5),sub:analysis.bb.squeeze?"Squeeze!":"Normal",color:analysis.bb.squeeze?D.amber:D.textMid},
                {label:"VWAP",value:analysis.vwap.toFixed(5),sub:analysis.price>analysis.vwap?"Above":"Below",color:analysis.price>analysis.vwap?D.emerald:D.rose},
              ]:[
                {label:"RSI (14)",value:analysis.rsi.toFixed(1),sub:analysis.rsi<30?"Oversold ↑":analysis.rsi>70?"Overbought ↓":"Neutral",color:analysis.rsi<30?D.emerald:analysis.rsi>70?D.rose:D.sky},
                {label:"Stoch (14)",value:analysis.stoch.toFixed(1),sub:analysis.stoch<25?"Oversold ↑":analysis.stoch>75?"Overbought ↓":"Neutral",color:analysis.stoch<25?D.emerald:analysis.stoch>75?D.rose:D.sky},
                {label:"MACD 12/26",value:(analysis.macd.macd*10000).toFixed(2),sub:analysis.macd.macd>0?"Bullish ↑":"Bearish ↓",color:analysis.macd.macd>0?D.emerald:D.rose},
                {label:"VWAP",value:analysis.vwap.toFixed(5),sub:analysis.price>analysis.vwap?"Above VWAP":"Below VWAP",color:analysis.price>analysis.vwap?D.emerald:D.rose},
                {label:"Williams %R",value:analysis.wr.toFixed(1),sub:analysis.wr<-85?"Oversold":analysis.wr>-15?"Overbought":"Neutral",color:analysis.wr<-85?D.emerald:analysis.wr>-15?D.rose:D.sky},
                {label:"CCI (20)",value:analysis.cci.toFixed(0),sub:analysis.cci<-150?"Oversold":analysis.cci>150?"Overbought":"Neutral",color:analysis.cci<-150?D.emerald:analysis.cci>150?D.rose:D.sky},
                {label:"MFI (14)",value:analysis.mfi.toFixed(0),sub:analysis.mfi<25?"Oversold":analysis.mfi>75?"Overbought":"Neutral",color:analysis.mfi<25?D.emerald:analysis.mfi>75?D.rose:D.sky},
                {label:"MTF Bias",value:analysis.mtf.bias,sub:`${analysis.mtf.strength}/4 aligned`,color:analysis.mtf.bias==="BULL"?D.emerald:D.rose},
                {label:"Support",value:analysis.support.toFixed(5),sub:"Buy Zone",color:D.emerald},
                {label:"Resistance",value:analysis.resistance.toFixed(5),sub:"Sell Zone",color:D.rose},
              ]).map((item,i)=>(
                <div key={i} style={{
                  background:"rgba(255,255,255,0.022)",borderRadius:12,
                  padding:"10px 11px",border:`1px solid rgba(255,255,255,0.05)`
                }}>
                  <div style={{fontSize:7,color:D.textDim,marginBottom:3,letterSpacing:1,fontWeight:600}}>{item.label}</div>
                  <div style={{fontSize:12,fontWeight:800,color:item.color,fontFamily:"'JetBrains Mono',monospace"}}>{item.value}</div>
                  <div style={{fontSize:7,color:D.textSub,marginTop:2}}>{item.sub}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ANALYSIS REASONS */}
        {analysis&&!loading&&(
          <div style={{background:"linear-gradient(135deg,#0F1521,#141B2C)",borderRadius:18,
            padding:"14px",marginBottom:12,border:`1px solid rgba(255,255,255,0.06)`}}>
            <div style={{fontSize:8,color:D.textMid,marginBottom:10,fontWeight:700,letterSpacing:2}}>
              FULL SIGNAL ANALYSIS
            </div>
            {analysis.reasons.map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,
                padding:"5px 0",borderBottom:i<analysis.reasons.length-1?`1px solid rgba(255,255,255,0.03)`:"none"}}>
                <div style={{width:4,height:4,borderRadius:"50%",flexShrink:0,
                  background:r.t==="buy"?D.emerald:r.t==="sell"?D.rose:D.textSub,
                  boxShadow:r.t==="buy"?`0 0 5px ${D.emerald}`:r.t==="sell"?`0 0 5px ${D.rose}`:"none"}}/>
                <span style={{fontSize:10,color:r.t==="buy"?"#6EE7B7":r.t==="sell"?"#FDA4AF":D.textSub}}>{r.txt}</span>
                <span style={{marginLeft:"auto",fontSize:10,fontWeight:700,
                  color:r.t==="buy"?D.emerald:r.t==="sell"?D.rose:D.textSub}}>
                  {r.t==="buy"?"▲":r.t==="sell"?"▼":"—"}
                </span>
              </div>
            ))}
          </div>
        )}

        {/* SIGNAL HISTORY */}
        {history.length>0&&(
          <div style={{background:"linear-gradient(135deg,#0F1521,#141B2C)",borderRadius:18,
            padding:"14px",marginBottom:12,border:`1px solid rgba(255,255,255,0.06)`}}>
            <div style={{fontSize:8,color:D.textMid,marginBottom:8,fontWeight:700,letterSpacing:2}}>
              SIGNAL HISTORY
            </div>
            {history.map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"8px 0",borderBottom:i<history.length-1?`1px solid rgba(255,255,255,0.04)`:"none"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:12,fontWeight:800,
                      color:s.signal==="BUY"?D.emerald:s.signal==="SELL"?D.rose:D.amber,
                      fontFamily:"'Space Grotesk',sans-serif"}}>
                      {s.signal}
                    </span>
                    <span style={{fontSize:7,color:s.mode==="SCALP"?D.amber:D.violet,fontWeight:700,
                      background:s.mode==="SCALP"?D.amberFnt:D.violetFnt,
                      padding:"1px 6px",borderRadius:4,letterSpacing:1}}>
                      {s.mode}
                    </span>
                  </div>
                  <div style={{fontSize:8,color:D.textSub,marginTop:2}}>{s.pair} · {s.timeframe}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:D.emerald,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{s.confidence}%</div>
                  <div style={{fontSize:8,color:D.textSub}}>{s.time}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* LIVE WINS */}
        <div style={{background:"linear-gradient(135deg,#0F1521,#141B2C)",borderRadius:18,
          padding:"14px",border:`1px solid rgba(255,255,255,0.06)`,marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
            <span style={{fontSize:14}}>🏆</span>
            <span style={{fontSize:8,color:D.amber,fontWeight:700,letterSpacing:2}}>LIVE WINS</span>
          </div>
          {liveWins.map((w,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,
              padding:"8px 0",borderBottom:i<liveWins.length-1?`1px solid rgba(255,255,255,0.04)`:"none"}}>
              <div style={{
                width:34,height:34,borderRadius:10,
                background:`linear-gradient(135deg,${D.violetDim},${D.violet}66)`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:13,fontWeight:900,flexShrink:0,color:"#fff",
                border:`1px solid ${D.violet}30`,fontFamily:"'Space Grotesk',sans-serif"
              }}>{w.name[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:D.text}}>{w.name}</div>
                <div style={{fontSize:8,color:D.textSub,marginTop:1}}>{w.pair} · {w.time}</div>
              </div>
              <div style={{fontSize:14,fontWeight:900,color:D.emerald,fontFamily:"'JetBrains Mono',monospace"}}>{w.profit}</div>
            </div>
          ))}
        </div>

        {/* RISK DISCLAIMER */}
        <div style={{padding:"12px 14px",borderRadius:14,
          background:"rgba(255,255,255,0.018)",border:`1px solid rgba(255,255,255,0.05)`,
          textAlign:"center"}}>
          <div style={{fontSize:8,color:D.textDim,lineHeight:1.7,letterSpacing:0.3}}>
            ⚠ Trading involves substantial risk of loss. Signals are generated by automated technical
            analysis and are not financial advice. Past performance does not guarantee future results.
            Trade responsibly and only with capital you can afford to lose.
          </div>
        </div>
      </div>

      {/* PAIR MODAL */}
      {showPairModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:500,
          display:"flex",alignItems:"flex-end",backdropFilter:"blur(12px)"}}>
          <div style={{width:"100%",maxHeight:"90vh",
            background:`linear-gradient(180deg,#10182A,#0F1521)`,
            borderRadius:"24px 24px 0 0",border:`1px solid rgba(20,184,166,0.2)`,
            overflow:"hidden",display:"flex",flexDirection:"column",
            boxShadow:"0 -12px 60px rgba(0,0,0,0.6)"}}>

            {/* Modal Header */}
            <div style={{padding:"18px 16px 10px",borderBottom:`1px solid rgba(255,255,255,0.06)`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:16}}>✦</div>
                  <div style={{fontWeight:800,fontSize:16,color:D.text,fontFamily:"'Space Grotesk',sans-serif"}}>New Signal</div>
                </div>
                <button onClick={()=>{setShowPairModal(false);setSearchPair("");}}
                  style={{background:"rgba(255,255,255,0.06)",border:`1px solid rgba(255,255,255,0.08)`,
                    color:D.textMid,fontSize:12,width:30,height:30,borderRadius:10,cursor:"pointer",fontWeight:700}}>✕</button>
              </div>

              <div style={{fontSize:8,color:D.textDim,fontWeight:700,letterSpacing:2,marginBottom:6}}>BROKER</div>
              <div style={{background:"rgba(34,197,94,0.06)",border:`1.5px solid rgba(34,197,94,0.25)`,borderRadius:14,
                padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"center",
                gap:8,marginBottom:14}}>
                <span style={{fontSize:16}}>🟩</span>
                <span style={{fontWeight:800,color:D.text,fontSize:14,fontFamily:"'Space Grotesk',sans-serif"}}>Quotex</span>
              </div>

              <div style={{fontSize:8,color:D.textDim,fontWeight:700,letterSpacing:2,marginBottom:8}}>TIME FRAME</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:5}}>
                {TIMEFRAMES.slice(0,4).map((t,i)=>{
                  const isActive=tfIdx===i;
                  return(
                    <button key={t.label} onClick={()=>setTfIdx(i)} style={{
                      padding:"9px 4px",borderRadius:10,border:"none",cursor:"pointer",
                      fontSize:11,fontWeight:800,fontFamily:"'Space Grotesk',sans-serif",
                      background:isActive?`linear-gradient(135deg,${D.violetDim},${D.violet})`:"rgba(255,255,255,0.04)",
                      color:isActive?"#fff":D.textSub,
                      border:isActive?`1px solid ${D.violet}40`:`1px solid rgba(255,255,255,0.06)`,
                      boxShadow:isActive?`0 4px 12px rgba(20,184,166,0.35)`:"none",
                    }}>{t.label}</button>
                  );
                })}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:14}}>
                {TIMEFRAMES.slice(4).map((t,i)=>{
                  const idx=i+4,isActive=tfIdx===idx;
                  return(
                    <button key={t.label} onClick={()=>setTfIdx(idx)} style={{
                      padding:"9px 4px",borderRadius:10,border:"none",cursor:"pointer",
                      fontSize:11,fontWeight:800,fontFamily:"'Space Grotesk',sans-serif",
                      background:isActive?`linear-gradient(135deg,${D.violetDim},${D.violet})`:"rgba(255,255,255,0.04)",
                      color:isActive?"#fff":D.textSub,
                      border:isActive?`1px solid ${D.violet}40`:`1px solid rgba(255,255,255,0.06)`,
                      boxShadow:isActive?`0 4px 12px rgba(20,184,166,0.35)`:"none",
                    }}>{t.label}</button>
                  );
                })}
              </div>

              <div style={{fontSize:8,color:D.textDim,fontWeight:700,letterSpacing:2,marginBottom:8}}>ASSET</div>
              <div style={{position:"relative",marginBottom:10}}>
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:13,color:D.textSub}}>🔍</span>
                <input value={searchPair} onChange={e=>setSearchPair(e.target.value)}
                  placeholder="Search pairs..."
                  style={{width:"100%",padding:"10px 14px 10px 36px",borderRadius:12,
                    border:`1px solid rgba(20,184,166,0.2)`,background:"rgba(255,255,255,0.04)",
                    color:D.text,fontSize:12,boxSizing:"border-box",outline:"none",fontFamily:"'Inter',sans-serif"}}/>
              </div>

              {!searchPair&&(
                <div style={{display:"flex",gap:6,marginBottom:6}}>
                  {["OTC","LIVE"].map(t=>(
                    <button key={t} onClick={()=>setActiveTab(t)} style={{
                      flex:1,padding:"8px 10px",borderRadius:10,border:"none",cursor:"pointer",
                      fontSize:10,fontWeight:800,letterSpacing:1,fontFamily:"'Space Grotesk',sans-serif",
                      background:activeTab===t?`linear-gradient(135deg,${D.violetDim},${D.violet})`:"rgba(255,255,255,0.04)",
                      color:activeTab===t?"#fff":D.textSub,
                      border:activeTab===t?`1px solid ${D.violet}40`:`1px solid rgba(255,255,255,0.06)`,
                    }}>
                      {t==="OTC"?"▦ OTC":"● LIVE"}
                      <div style={{fontSize:7,opacity:0.7,marginTop:1}}>{QUOTEX_PAIRS[t].length} pairs</div>
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Pairs List */}
            <div style={{overflowY:"auto",padding:"8px 14px 32px"}}>
              {filteredPairs.map(p=>{
                const isSelected=pair===p,isLive=!p.includes("(OTC)");
                return(
                  <div key={p} onClick={()=>{setPair(p);setShowPairModal(false);setSearchPair("");}}
                    style={{
                      padding:"13px 12px",borderBottom:`1px solid rgba(255,255,255,0.04)`,
                      cursor:"pointer",display:"flex",justifyContent:"space-between",
                      alignItems:"center",borderRadius:12,marginBottom:2,
                      background:isSelected?"rgba(20,184,166,0.1)":"transparent",
                      border:isSelected?`1px solid rgba(20,184,166,0.2)`:"1px solid transparent",
                      transition:"background 0.15s"
                    }}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{fontSize:18,minWidth:42}}>{getPairFlag(p)}</div>
                      <div>
                        <div style={{fontWeight:isSelected?800:600,fontSize:13,
                          color:isSelected?D.violetBrt:D.text,fontFamily:"'Inter',sans-serif"}}>{p}</div>
                        <div style={{fontSize:9,color:isLive?D.emerald:D.amber,marginTop:2,fontWeight:600,letterSpacing:0.5}}>
                          {isLive?"● LIVE":"▦ OTC"}
                        </div>
                      </div>
                    </div>
                    {isSelected&&<div style={{color:D.violet,fontSize:14,fontWeight:900}}>✓</div>}
                  </div>
                );
              })}
            </div>

            {/* Generate button in modal */}
            <div style={{padding:"12px 16px",borderTop:`1px solid rgba(255,255,255,0.06)`,background:"rgba(8,12,20,0.95)"}}>
              <button onClick={()=>{setShowPairModal(false);handleGenerate();}} style={{
                width:"100%",padding:"15px",borderRadius:16,border:"none",
                background:`linear-gradient(135deg,${D.violetDim},${D.violet},${D.violetBrt})`,
                color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer",
                boxShadow:`0 8px 28px rgba(20,184,166,0.45)`,letterSpacing:3,
                fontFamily:"'Space Grotesk',sans-serif",
                display:"flex",alignItems:"center",justifyContent:"center",gap:8
              }}>
                <span>⚡</span> GENERATE SIGNAL
              </button>
            </div>
          </div>
        </div>
      )}

      <style>{`
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
        @keyframes scanLine{0%{left:-100%}100%{left:200%}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse2{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
        @keyframes revealUp{0%{opacity:0;transform:scale(0.92) translateY(10px)}60%{transform:scale(1.02) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes floatUpDown{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
        @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(20,184,166,0.2)}50%{box-shadow:0 0 40px rgba(20,184,166,0.48)}}
        @keyframes rotateSlow{to{transform:translate(-50%,-50%) rotate(360deg)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
        *{box-sizing:border-box;}
        input::placeholder{color:rgba(148,163,184,0.35);}
        ::-webkit-scrollbar{width:3px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:rgba(20,184,166,0.25);border-radius:3px;}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BKTrader/>);
</script>
</body>
</html>
